[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage configuration
addopts =
    --cov=.
    --cov-report=term
    --cov-report=html:coverage_html
    --cov-report=xml:coverage.xml
    --cov-fail-under=90
    -v

# Odoo test markers
markers =
    odoo: Odoo test case (TransactionCase)
    post_install: Post-installation tests
    at_install: At-installation tests
    fund_management: Fund management module tests
    allocation: Fund allocation tests
    requisition: Fund requisition tests
    transfer: Fund transfer tests
    bill: Fund bill tests
    ledger: Fund ledger tests
    account: Fund account tests
    security: Security mixin tests
    approval_matrix: Approval matrix tests
    bank_email: Bank email parser tests
    reconciliation: Ledger reconciliation tests
    concurrency: Concurrency and race condition tests
    api: API and authentication tests
    workflow: End-to-end workflow tests
    audit: Audit trail tests
