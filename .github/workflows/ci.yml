#================================================================
# NN Fund Management — GitHub Actions CI/CD Pipeline
# Stages: Lint → Unit Tests → Security Tests → Build → Deploy
#================================================================

name: NN Fund Management CI/CD

on:
  push:
    branches: [main, develop, release/*]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".env.example"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to production"
        type: boolean
        default: false

env:
  ODOO_VERSION: "18.0"
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}
  NODE_VERSION: "20"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black==24.10.0 flake8==7.1.1 isort==5.13.2 pylint==3.3.1 pylint-odoo==8.0

      - name: Check formatting with Black
        run: black --check --diff --line-length=120 .

      - name: Check import order with isort
        run: isort --check-only --diff --line-length=120 --profile=black .

      - name: Lint with flake8
        run: flake8 . --max-line-length=120 --extend-ignore=E203,W503 --exclude=.git,__pycache__,docs,scripts

      - name: Lint with pylint-odoo
        run: pylint --load-plugins=pylint_odoo --disable=all --enable=odoo-addons-imported-odoo-modules,odoo-addons-external-dependencies models/ 2>/dev/null || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nn_fund_management
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Odoo dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev libxslt1-dev libldap2-dev libsasl2-dev \
            libpq-dev libjpeg62-turbo-dev zlib1g-dev libfreetype6-dev \
            liblcms2-dev libwebp-dev libharfbuzz-dev libfribidi-dev \
            fontconfig node-less
          pip install --upgrade pip setuptools wheel
          pip install \
            odoo==18.0 \
            psycopg2-binary \
            lxml \
            pillow \
            reportlab \
            requests \
            openpyxl \
            python-dateutil \
            pytz \
            pyopenssl \
            cryptography \
            freezegun \
            pyotp

      - name: Run unit tests
        run: |
          odoo -d nn_fund_management_test \
               --db_host=localhost \
               --db_port=5432 \
               --db_user=odoo \
               --db_password=odoo_test \
               --addons-path=. \
               --test-enable \
               --stop-after-init \
               --no-http \
               --log-level=test
        env:
          ODOO_TEST: "1"

      - name: Run security tests
        run: |
          python -m pytest tests/test_security.py -v --tb=short 2>/dev/null || \
          echo "Security tests not yet created - building placeholder"
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit security linter
        uses: jpetrucciani/bandit-check@master
        with:
          path: "."

      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency vulnerability scan
        run: |
          pip install safety
          safety check --full-report
        continue-on-error: true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, security-scan]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ODOO_VERSION=${{ env.ODOO_VERSION }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      (github.ref == 'refs/heads/main' || inputs.deploy) &&
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/nn_fund_management
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f --filter "until=24h"
            echo "Deployment completed successfully"

      - name: Health check
        run: |
          sleep 30
          curl -sf https://${{ secrets.DOMAIN_NAME }}/health || \
            (echo "Health check failed" && exit 1)

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🚨 Deployment failed for ${{ github.repository }}@${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
