#================================================================
# NN Fund Management — Nginx Production Configuration
# Odoo 18 Reverse Proxy with SSL, Rate Limiting, Security Headers
#================================================================

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=web:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 50m;
    client_body_buffer_size 128k;
    client_body_timeout 60s;
    client_header_timeout 30s;
    send_timeout 30s;
    reset_timedout_connection on;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format upstream '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'upstream=$upstream_addr '
                       'upstream_status=$upstream_status '
                       'request_time=$request_time '
                       'upstream_response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log upstream buffer=32k flush=5s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_disable "msie6";
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-font-ttf
        application/x-font-opentype
        image/svg+xml
        font/woff
        font/woff2;

    # Security headers - default
    map $upstream_http_content_type $x_frame_options {
        default "SAMEORIGIN";
        "text/html" "SAMEORIGIN";
    }

    # SSL configuration (uncomment for production with real certificates)
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_prefer_server_ciphers on;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    # ssl_ecdh_curve secp384r1:p384:prime256v1;
    # ssl_session_cache shared:SSL:50m;
    # ssl_session_timeout 1d;
    # ssl_session_tickets off;
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 1.1.1.1 8.8.8.8 valid=300s;
    # resolver_timeout 5s;

    # OCSP stapling (uncomment for production)
    # ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN_NAME}/chain.pem;

    # HSTS preload (uncomment for production)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Cache zone for proxy
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=odoo_cache:10m inactive=60m use_temp_path=off max_size=1g;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_valid 200 302 60m;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

    # Upstream Odoo servers
    upstream odoo_upstream {
        least_conn;
        server odoo:8069 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Upstream Odoo longpolling
    upstream odoo_longpolling {
        least_conn;
        server odoo:8072 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # HTTP (local/dev) — also serves as fallback when no SSL certs
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location / {
            proxy_pass http://odoo_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 360s;
            proxy_send_timeout 360s;
        }
    }

