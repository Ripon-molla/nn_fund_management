[options]
; Database
db_host = db
db_port = 5432
db_user = ${DB_USER:odoo}
db_password = ${DB_PASSWORD:odoo}
db_name = ${DB_NAME:False}
db_sslmode = prefer
dbfilter = ${DB_FILTER:.*}

; Paths
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /opt/odoo/data
logfile = /var/log/odoo/odoo-server.log
logrotate = True

; Performance
workers = ${WORKERS:4}
max_cron_threads = ${MAX_CRON_THREADS:2}
limit_time_cpu = ${LIMIT_TIME_CPU:600}
limit_time_real = ${LIMIT_TIME_REAL:1200}
limit_memory_soft = ${LIMIT_MEMORY_SOFT:2684354560}
limit_memory_hard = ${LIMIT_MEMORY_HARD:4294967296}
limit_request = ${LIMIT_REQUEST:8192}
geoip_database = /usr/share/GeoIP/GeoLite2-City.mmdb

; Security
admin_passwd = ${ADMIN_PASSWORD:admin}
proxy_mode = True
list_db = ${LIST_DB:False}

; Email
email_from = ${EMAIL_FROM:False}
smtp_server = ${SMTP_HOST:False}
smtp_port = ${SMTP_PORT:587}
smtp_user = ${SMTP_USER:False}
smtp_password = ${SMTP_PASSWORD:False}
smtp_ssl = ${SMTP_SSL:False}

; Session
session_expire = True
session_ttl = ${SESSION_TTL:3600}

; Audit
log_level = ${LOG_LEVEL:info}
log_db = ${LOG_DB:False}
log_handler = ${LOG_HANDLER::INFO}
