#================================================================
# NN Fund Management — Nginx LOCAL DEVELOPMENT Configuration
# No SSL, no certbot, minimal security for local dev
#================================================================

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 50m;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=odoo_cache:10m inactive=60m max_size=1g;

    upstream odoo_upstream {
        server odoo:8069 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        server_name localhost;

        location / {
            proxy_pass http://odoo_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 360s;
            proxy_send_timeout 360s;
        }

        location /longpolling/ {
            proxy_pass http://odoo_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        location /websocket {
            proxy_pass http://odoo_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }
    }
}
